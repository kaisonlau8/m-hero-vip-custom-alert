<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VIP 保养提醒控制台{% endblock %}</title>
  <style>
    :root {
      --blue: #3370ff;
      --orange: #ff8800;
      --red: #f5222d;
      --turquoise: #00b578;
      --gray: #8f959e;
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #1f2329;
      --border: #dee0e3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .nav { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
    .nav h1 { font-size: 18px; font-weight: 600; color: var(--orange); }
    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .stat { padding: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; text-align: center; }
    .stat .num { font-size: 24px; font-weight: 700; color: var(--blue); }
    .stat .label { font-size: 13px; color: var(--gray); }
    .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2860e0; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-success { background: var(--turquoise); color: #fff; }
    .btn-warning { background: var(--orange); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    td, th { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .badge-red { background: #fff1f0; color: #cf1322; }
    .badge-green { background: #e8f8ee; color: var(--turquoise); }
    footer { text-align: center; padding: 16px; color: var(--gray); font-size: 13px; }
  </style>
</head>
<body>
  <nav class="nav">
    <h1>VIP 保养提醒控制台</h1>
    <a href="/" style="color:var(--text); text-decoration:none; font-size:14px;">仪表盘</a>
    <span style="margin-left:auto; color:var(--gray); font-size:13px;">端口 9002</span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>猛士科技 服务运营 — VIP 客户保养提醒</footer>
</body>
</html>
